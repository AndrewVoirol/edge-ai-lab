# =============================================================================
# Edge AI Lab — SwiftLint Configuration
# =============================================================================
# Minimal, safety-focused rules. Style enforcement is kept light to reduce
# friction for contributors while catching real bugs.

# Only analyze the main source code
included:
  - Sources

excluded:
  - Derived
  - build
  - DerivedData
  - RawBenchmark
  - .build

# ─── Disabled Rules ──────────────────────────────────────────────────────────
# Style rules that create noise without catching bugs
disabled_rules:
  - trailing_whitespace
  - todo
  - nesting
  - identifier_name
  - type_name
  - cyclomatic_complexity
  - function_body_length

# ─── Opt-In Rules ────────────────────────────────────────────────────────────
# Safety rules worth enforcing
opt_in_rules:
  - empty_count
  - closure_end_indentation
  - contains_over_first_not_nil
  - discouraged_optional_boolean
  - fallthrough
  - first_where
  - joined_default_parameter
  - last_where
  - modifier_order
  - redundant_nil_coalescing
  - toggle_bool
  - unavailable_function

# ─── Rule Configuration ─────────────────────────────────────────────────────
line_length:
  warning: 200
  error: 300
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 600
  error: 1000

type_body_length:
  warning: 400
  error: 800

function_parameter_count:
  warning: 8
  error: 12

large_tuple:
  warning: 4
  error: 6

# Allow force unwrap/cast/try — the codebase uses them sparingly and correctly
force_cast: warning
force_try: warning
