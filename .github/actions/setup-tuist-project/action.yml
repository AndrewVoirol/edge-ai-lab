name: 'Setup Tuist Project'
description: 'Install Tuist, generate the Xcode project, and resolve SPM dependencies'

inputs:
  spm-packages-dir:
    description: 'Path to the SPM packages directory'
    required: true
  cache-key-suffix:
    description: 'Optional suffix for the SPM cache key (e.g., "benchmark")'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Install Tuist
      uses: jdx/mise-action@v4

    - name: Verify Tuist
      shell: bash
      run: tuist version

    - name: Cache SPM Packages
      uses: actions/cache@v5
      with:
        path: ${{ inputs.spm-packages-dir }}
        key: ${{ runner.os }}-spm-v3-${{ inputs.cache-key-suffix && format('{0}-', inputs.cache-key-suffix) }}${{ hashFiles('Project.swift') }}
        restore-keys: |
          ${{ runner.os }}-spm-v3-${{ inputs.cache-key-suffix && format('{0}-', inputs.cache-key-suffix) }}

    - name: Clear Stale Binary Artifacts
      shell: bash
      run: |
        # LiteRT-LM's CLiteRTLM xcframework binaries are hosted at GitHub Release URLs.
        # Google occasionally re-uploads these with different content (same URL, new checksum).
        # SPM caches the old checksum in multiple locations and refuses to re-download.
        #
        # MUST run BEFORE tuist generate (which triggers package resolution internally).
        # Locations:
        #   1. Global SPM cache: ~/Library/Caches/org.swift.swiftpm/
        #   2. Cloned packages dir: xcframeworks downloaded by SPM
        #   3. Workspace-level state (created by tuist generate, cleared preemptively)
        echo "Clearing stale binary target artifacts..."
        rm -rf ~/Library/Caches/org.swift.swiftpm/ 2>/dev/null || true
        find "${{ inputs.spm-packages-dir }}" -name "*.xcframework" -type d -exec rm -rf {} + 2>/dev/null || true
        find "${{ inputs.spm-packages-dir }}" -name "*.artifactbundle" -type d -exec rm -rf {} + 2>/dev/null || true
        echo "✅ Binary artifact caches cleared"

    - name: Generate Xcode Project
      shell: bash
      run: |
        tuist clean
        # tuist generate creates the workspace, then attempts package resolution.
        # Resolution may fail for large deps (LiteRT-LM). We allow failure here
        # and resolve separately with -clonedSourcePackagesDirPath.
        tuist generate --no-open || echo "⚠️ tuist generate package resolution failed — will retry"
      env:
        GIT_TERMINAL_PROMPT: "0"
        # LiteRT-LM uses Git LFS for Android prebuilt binaries (.so files).
        # SPM only needs the Swift source — skip LFS smudge to avoid
        # "remote missing object" errors on Android artifacts.
        GIT_LFS_SKIP_SMUDGE: "1"

    - name: Resolve Packages
      shell: bash
      run: |
        set -o pipefail
        if [ ! -d "EdgeAILab.xcworkspace" ]; then
          echo "❌ EdgeAILab.xcworkspace not found — tuist generate failed before workspace creation"
          exit 1
        fi
        echo "Resolving packages with clonedSourcePackagesDirPath..."
        xcodebuild -resolvePackageDependencies \
          -workspace EdgeAILab.xcworkspace \
          -scheme "Edge AI Lab" \
          -skipPackagePluginValidation \
          -clonedSourcePackagesDirPath "${{ inputs.spm-packages-dir }}" \
          2>&1 | tail -50
      env:
        GIT_LFS_SKIP_SMUDGE: "1"
