name: 'Setup Tuist Project'
description: 'Install Tuist, generate the Xcode project, and resolve SPM dependencies'

inputs:
  spm-packages-dir:
    description: 'Path to the SPM packages directory'
    required: true
  cache-key-suffix:
    description: 'Optional suffix for the SPM cache key (e.g., "benchmark")'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Install Tuist
      uses: jdx/mise-action@v4

    - name: Verify Tuist
      shell: bash
      run: tuist version

    - name: Download Metal Toolchain
      shell: bash
      run: |
        # Xcode 27 beta runners don't ship with the Metal compiler toolchain.
        # mlx-swift uses Metal shaders for GPU compute, so this is required.
        echo "Downloading Metal Toolchain..."
        xcodebuild -downloadComponent MetalToolchain 2>&1 || true
        echo "✅ Metal Toolchain download complete"

    - name: Cache SPM Packages
      uses: actions/cache@v5
      with:
        path: ${{ inputs.spm-packages-dir }}
        key: ${{ runner.os }}-spm-v5-${{ inputs.cache-key-suffix && format('{0}-', inputs.cache-key-suffix) }}${{ hashFiles('Project.swift') }}
        restore-keys: |
          ${{ runner.os }}-spm-v5-${{ inputs.cache-key-suffix && format('{0}-', inputs.cache-key-suffix) }}

    - name: Clear Stale SPM Checksum Cache
      shell: bash
      run: |
        # LiteRT-LM's CLiteRTLM xcframework binaries are hosted at GitHub Release URLs.
        # Google occasionally re-uploads these with different content (same URL, new checksum).
        # SPM caches the old checksum in the global SPM cache and refuses to re-download.
        #
        # We clear ONLY the global SPM cache (which stores checksums), NOT the xcframeworks
        # themselves. xcodebuild -resolvePackageDependencies resolves source packages but does
        # NOT re-download binary targets — so deleting xcframeworks from .spm-packages causes
        # "There is no XCFramework found at..." build failures.
        #
        # If LiteRT-LM re-uploads binaries with new checksums again, bump the cache key
        # version in the Cache SPM Packages step above (v3 → v4) to force a full re-download.
        echo "Clearing global SPM checksum cache..."
        rm -rf ~/Library/Caches/org.swift.swiftpm/ 2>/dev/null || true
        echo "✅ Global SPM cache cleared"

    - name: Generate Xcode Project
      shell: bash
      run: |
        tuist clean
        # tuist generate creates the workspace, then attempts package resolution.
        # Resolution may fail for large deps (LiteRT-LM). We allow failure here
        # and resolve separately with -clonedSourcePackagesDirPath.
        tuist generate --no-open || echo "⚠️ tuist generate package resolution failed — will retry"
      env:
        GIT_TERMINAL_PROMPT: "0"
        # LiteRT-LM uses Git LFS for Android prebuilt binaries (.so files).
        # SPM only needs the Swift source — skip LFS smudge to avoid
        # "remote missing object" errors on Android artifacts.
        GIT_LFS_SKIP_SMUDGE: "1"

    - name: Resolve Packages
      shell: bash
      run: |
        set -o pipefail
        if [ ! -d "EdgeAILab.xcworkspace" ]; then
          echo "❌ EdgeAILab.xcworkspace not found — tuist generate failed before workspace creation"
          exit 1
        fi
        echo "Resolving packages with clonedSourcePackagesDirPath..."
        xcodebuild -resolvePackageDependencies \
          -workspace EdgeAILab.xcworkspace \
          -scheme "Edge AI Lab" \
          -skipPackagePluginValidation \
          -clonedSourcePackagesDirPath "${{ inputs.spm-packages-dir }}" \
          2>&1 | tail -50
      env:
        GIT_LFS_SKIP_SMUDGE: "1"
