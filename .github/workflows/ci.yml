      - name: Pre-clone LiteRT-LM
        run: |
          REPO_DIR="${SPM_PACKAGES_DIR}/LiteRT-LM"
          if [ -d "$REPO_DIR" ]; then
            echo "Updating existing clone..."
            git -C "$REPO_DIR" fetch --all 2>&1 || true
          else
            echo "Cloning LiteRT-LM..."
            mkdir -p "$SPM_PACKAGES_DIR"
            git clone --bare --mirror https://github.com/google-ai-edge/LiteRT-LM.git "$REPO_DIR" 2>&1
          fi
          echo "LiteRT-LM HEAD: $(git -C "$REPO_DIR" rev-parse HEAD)"

      - name: Generate Xcode Project
        run: tuist generate --no-open
        env:
          GIT_TERMINAL_PROMPT: "0"
        continue-on-error: true

      - name: Resolve Packages (with pre-cloned repos)
        run: |
          xcodebuild -resolvePackageDependencies \
            -workspace GemmaEdgeGallery.xcworkspace \
            -clonedSourcePackagesDirPath "$SPM_PACKAGES_DIR" \
            2>&1 | tail -20

      - name: Select Simulator
        id: sim
        run: |
          DEVICE=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in sorted(data['devices'].items(), reverse=True):
              if 'iOS' in runtime:
                  for d in devices:
                      if 'iPhone' in d['name'] and d['isAvailable']:
                          print(d['udid'])
                          sys.exit(0)
          sys.exit(1)
          ")
          echo "udid=$DEVICE" >> "$GITHUB_OUTPUT"

      - name: Build & Run iOS UI Smoke Tests
        run: |
          xcodebuild \
            -workspace GemmaEdgeGallery.xcworkspace \
            -scheme GemmaEdgeGallery_iOS \
            -destination 'platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}' \
            -clonedSourcePackagesDirPath "$SPM_PACKAGES_DIR" \
            -only-testing:GemmaEdgeGallery_iOSUITests \
            test \
