name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SPM_PACKAGES_DIR: ${{ github.workspace }}/.spm-packages

jobs:
  build-and-test:
    name: macOS Build & Test
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify No Singleton
        run: |
          if grep -r "ConversationViewModel\.shared" Sources/; then
            echo "❌ ConversationViewModel.shared found in Sources/ — singleton was removed in P0 refactor"
            exit 1
          fi
          echo "✅ No ConversationViewModel.shared in Sources/"

      - name: Setup Tuist Project
        uses: ./.github/actions/setup-tuist-project
        with:
          spm-packages-dir: ${{ env.SPM_PACKAGES_DIR }}

      - name: SwiftLint
        run: |
          brew install swiftlint || true
          swiftlint --strict --reporter github-actions-logging || true

      - name: Build macOS
        run: |
          xcodebuild \
            -workspace GemmaEdgeGallery.xcworkspace \
            -scheme "Edge AI Lab" \
            -destination 'platform=macOS' \
            -clonedSourcePackagesDirPath "$SPM_PACKAGES_DIR" \
            build \
            COMPILER_INDEX_STORE_ENABLE=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tail -50

      - name: Test macOS
        run: |
          xcodebuild \
            -workspace GemmaEdgeGallery.xcworkspace \
            -scheme "Edge AI Lab" \
            -destination 'platform=macOS' \
            -clonedSourcePackagesDirPath "$SPM_PACKAGES_DIR" \
            -only-testing:GemmaEdgeGallery_macOSTests \
            test \
            COMPILER_INDEX_STORE_ENABLE=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults.xcresult \
            2>&1 | tail -100

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-macos
          path: TestResults.xcresult

  build-and-test-ios:
    name: iOS Simulator Build & Test
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Tuist Project
        uses: ./.github/actions/setup-tuist-project
        with:
          spm-packages-dir: ${{ env.SPM_PACKAGES_DIR }}

      - name: List Available Simulators
        run: |
          echo "=== Available iOS Runtimes ==="
          xcrun simctl list runtimes | grep -i ios || true
          echo ""
          echo "=== Available iPhone Simulators ==="
          xcrun simctl list devices available | grep -i iphone || true

      - name: Select Simulator
        id: sim
        run: |
          DEVICE=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in sorted(data['devices'].items(), reverse=True):
              if 'iOS' in runtime:
                  for d in devices:
                      if 'iPhone' in d['name'] and d['isAvailable']:
                          print(d['udid'])
                          sys.exit(0)
          sys.exit(1)
          ")
          echo "udid=$DEVICE" >> "$GITHUB_OUTPUT"
          echo "Selected simulator: $DEVICE"

      - name: Build & Test iOS (Unit Tests)
        run: |
          xcodebuild \
            -workspace GemmaEdgeGallery.xcworkspace \
            -scheme GemmaEdgeGallery_iOS \
            -destination 'platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}' \
            -clonedSourcePackagesDirPath "$SPM_PACKAGES_DIR" \
            -only-testing:GemmaEdgeGallery_iOSTests \
            test \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ARCHS=arm64 \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults-iOS.xcresult \
            2>&1 | tail -100

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-ios
          path: TestResults-iOS.xcresult

  build-ios-uitests:
    name: iOS Simulator UI Smoke Tests
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Tuist Project
        uses: ./.github/actions/setup-tuist-project
        with:
          spm-packages-dir: ${{ env.SPM_PACKAGES_DIR }}

      - name: Select Simulator
        id: sim
        run: |
          DEVICE=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in sorted(data['devices'].items(), reverse=True):
              if 'iOS' in runtime:
                  for d in devices:
                      if 'iPhone' in d['name'] and d['isAvailable']:
                          print(d['udid'])
                          sys.exit(0)
          sys.exit(1)
          ")
          echo "udid=$DEVICE" >> "$GITHUB_OUTPUT"

      - name: Build & Run iOS UI Smoke Tests
        run: |
          xcodebuild \
            -workspace GemmaEdgeGallery.xcworkspace \
            -scheme GemmaEdgeGallery_iOS \
            -destination 'platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}' \
            -clonedSourcePackagesDirPath "$SPM_PACKAGES_DIR" \
            -only-testing:GemmaEdgeGallery_iOSUITests \
            test \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ARCHS=arm64 \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults-iOS-UI.xcresult \
            2>&1 | tail -100

      - name: Upload UI Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-ios-ui
          path: TestResults-iOS-UI.xcresult
