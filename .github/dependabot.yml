version: 2
updates:
  # Keep Swift package dependencies up to date
  - package-ecosystem: "swift"
    directory: "/"
    schedule:
      interval: "weekly"
    # Group minor/patch updates into a single PR
    groups:
      dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Keep GitHub Actions versions up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
