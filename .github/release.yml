# Configuration for GitHub's auto-generated release notes.
# This categorizes PRs into sections when creating a GitHub Release.
# See: https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes

changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: "🚀 Features"
      labels:
        - enhancement
        - feature
    - title: "🐛 Bug Fixes"
      labels:
        - bug
        - fix
    - title: "📚 Documentation"
      labels:
        - documentation
        - docs
    - title: "🧪 Testing"
      labels:
        - testing
        - tests
    - title: "🔧 Maintenance"
      labels:
        - chore
        - maintenance
        - dependencies
    - title: "📦 Other Changes"
      labels:
        - "*"
